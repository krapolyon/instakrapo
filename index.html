  :root{
    --bg:#faf6ee;
    --card:#ffffff;
    --ink:#2a2622;
    --muted:#8a8178;
    --line:#ece4d6;
    --gold:#c8992e;
    --gold-d:#a97e1e;
    --teal:#1e6b6b;
    --radius:16px;
    --shadow:0 8px 30px rgba(60,45,20,.10);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{
    font-family:"Quicksand",system-ui,sans-serif;
    background:
      radial-gradient(1200px 600px at 80% -10%, #fff4dd 0%, transparent 60%),
      radial-gradient(900px 500px at -10% 110%, #e8f3f1 0%, transparent 55%),
      var(--bg);
    color:var(--ink);
    min-height:100dvh;
    padding:16px 14px calc(28px + env(safe-area-inset-bottom));
  }
  .wrap{max-width:520px;margin:0 auto}
  header{display:flex;align-items:center;gap:11px;margin:2px 4px 16px}
  header .app-icon{width:40px;height:40px;border-radius:11px;box-shadow:0 3px 10px rgba(0,0,0,.18)}
  header .logo{font-family:"Adam Script","Great Vibes",cursive;font-size:42px;color:var(--teal);line-height:1}
  header .sub{font-size:12px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}

  .stage-wrap{position:relative;background:#111;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);aspect-ratio:3/4;touch-action:none}
  canvas#c{display:block;width:100%;height:100%;cursor:grab;touch-action:none}
  canvas#c:active{cursor:grabbing}
  .drop-hint{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#e9e2d5;text-align:center;padding:24px;pointer-events:none}
  .drop-hint svg{opacity:.85}
  .drop-hint p{margin:0;font-size:14px;font-weight:500;opacity:.9}
  .move-hint{position:absolute;left:50%;top:12px;transform:translateX(-50%);background:rgba(0,0,0,.45);color:#fff;font-size:11px;font-weight:600;letter-spacing:.04em;padding:5px 11px;border-radius:999px;backdrop-filter:blur(6px);opacity:0;transition:opacity .25s;pointer-events:none}
  .move-hint.show{opacity:1}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-top:14px;box-shadow:0 2px 10px rgba(60,45,20,.04)}
  .row{display:flex;gap:10px}
  .row>*{flex:1}
  label{display:block;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:0 0 5px 2px}
  select,input[type=text],input[type=number]{
    width:100%;font-family:inherit;font-size:15px;font-weight:600;color:var(--ink);
    background:#fbf8f2;border:1.5px solid var(--line);border-radius:11px;padding:11px 12px;outline:none;transition:border-color .15s;
  }
  select:focus,input:focus{border-color:var(--gold)}
  .field+.field{margin-top:12px}
  .row .field+.field{margin-top:0}
  .row{align-items:flex-start}

  .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;font-family:inherit;font-size:15px;font-weight:700;border:none;border-radius:12px;padding:13px;cursor:pointer;transition:transform .08s,filter .15s}
  .btn:active{transform:translateY(1px)}
  .btn-gold{background:linear-gradient(180deg,var(--gold) 0%,var(--gold-d) 100%);color:#fff;box-shadow:0 4px 14px rgba(200,153,46,.35)}
  .btn-ghost{background:#fbf8f2;color:var(--ink);border:1.5px solid var(--line)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btn-row{display:flex;gap:10px;margin-top:12px}

  .slider-field{margin-top:12px}
  .slider-field .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
  .slider-field .val{font-size:13px;font-weight:700;color:var(--teal)}
  input[type=range]{width:100%;-webkit-appearance:none;appearance:none;height:6px;border-radius:99px;background:var(--line);outline:none;margin:8px 0}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--gold);border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.2);cursor:pointer}
  input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--gold);border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.2);cursor:pointer}

  details.adv{margin-top:14px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius)}
  details.adv>summary{list-style:none;cursor:pointer;padding:13px 14px;font-size:13px;font-weight:700;letter-spacing:.04em;color:var(--muted);display:flex;align-items:center;justify-content:space-between}
  details.adv>summary::-webkit-details-marker{display:none}
  details.adv>summary .chev{transition:transform .2s}
  details.adv[open]>summary .chev{transform:rotate(180deg)}
  .adv-body{padding:0 14px 14px}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .color-field{display:flex;align-items:center;gap:8px}
  .color-field input[type=color]{width:38px;height:38px;padding:0;border:1.5px solid var(--line);border-radius:9px;background:none;cursor:pointer}
  .foot{text-align:center;color:var(--muted);font-size:11px;margin-top:16px;line-height:1.5}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <img class="app-icon" src="./icon-192.png" alt="" onerror="this.style.display='none'">
    <span class="logo">Instakrapo</span>
  </header>

  <div class="stage-wrap" id="stageWrap">
    <canvas id="c" width="1080" height="1440"></canvas>
    <div class="move-hint" id="moveHint">maintiens pour déplacer · pince pour zoomer</div>
    <div class="drop-hint" id="dropHint">
      <svg width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.6"/><path d="M21 15l-5-5L5 21"/></svg>
      <p>Touche pour importer une photo<br><span style="opacity:.7;font-size:12px">(ou glisse-dépose / colle une image)</span></p>
    </div>
  </div>

  <div class="card">
    <div class="field">
      <label for="stageSel">Étape</label>
      <select id="stageSel"></select>
    </div>
    <div class="row" style="margin-top:12px">
      <div class="field">
        <label for="cityIn">Ville</label>
        <input type="text" id="cityIn" placeholder="Nom de l'étape" autocomplete="off">
      </div>
      <div class="field" style="max-width:110px;flex:0 0 110px">
        <label for="dayIn">Jour</label>
        <input type="number" id="dayIn" min="1" placeholder="1" inputmode="numeric">
      </div>
    </div>

    <button class="btn btn-gold" id="dlBtn" style="margin-top:14px" disabled>⬇&nbsp; Enregistrer / Partager</button>
    <input type="file" id="fileIn" accept="image/*" style="display:none">

    <div class="slider-field">
      <div class="head"><label style="margin:0">Zoom</label><span class="val" id="zoomVal">100%</span></div>
      <input type="range" id="zoom" min="100" max="400" value="100">
    </div>
  </div>

  <details class="adv">
    <summary>Réglages fins <span class="chev">⌄</span></summary>
    <div class="adv-body">
      <div class="field">
        <label for="fontSel">Police du nom</label>
        <select id="fontSel">
          <option value="Adam Script" selected>Adam Script</option>
          <option value="Adam Script Bold">Adam Script (gras)</option>
          <option value="Adam Script Heavy">Adam Script (extra-gras)</option>
          <option value="Great Vibes">Great Vibes</option>
          <option value="Allura">Allura</option>
          <option value="Alex Brush">Alex Brush</option>
          <option value="Kaushan Script">Kaushan Script</option>
          <option value="Yellowtail">Yellowtail</option>
          <option value="Sacramento">Sacramento</option>
          <option value="Pacifico">Pacifico</option>
        </select>
      </div>

      <div class="two" style="margin-top:12px">
        <div class="slider-field" style="margin:0">
          <div class="head"><label style="margin:0">Taille nom</label><span class="val" id="nameSzVal">155</span></div>
          <input type="range" id="nameSz" min="80" max="240" value="155">
        </div>
        <div class="slider-field" style="margin:0">
          <div class="head"><label style="margin:0">Taille jour</label><span class="val" id="daySzVal">45</span></div>
          <input type="range" id="daySz" min="18" max="80" value="45">
        </div>
      </div>

      <div class="two" style="margin-top:6px">
        <div class="slider-field" style="margin:0">
          <div class="head"><label style="margin:0">Inclinaison</label><span class="val" id="tiltVal">-8°</span></div>
          <input type="range" id="tilt" min="-20" max="20" value="-8">
        </div>
        <div class="slider-field" style="margin:0">
          <div class="head"><label style="margin:0">Hauteur texte</label><span class="val" id="posVal">0</span></div>
          <input type="range" id="pos" min="-120" max="120" value="0">
        </div>
      </div>

      <div class="two" style="margin-top:6px">
        <div class="slider-field" style="margin:0">
          <div class="head"><label style="margin:0">Bande frosted</label><span class="val" id="bandVal">13%</span></div>
          <input type="range" id="band" min="0" max="45" value="13">
        </div>
        <div class="slider-field" style="margin:0">
          <div class="head"><label style="margin:0">Flou</label><span class="val" id="blurVal">24</span></div>
          <input type="range" id="blur" min="0" max="50" value="24">
        </div>
      </div>

      <div class="two" style="margin-top:6px">
        <div class="slider-field" style="margin:0">
          <div class="head"><label style="margin:0">Voile blanc</label><span class="val" id="tintVal">22%</span></div>
          <input type="range" id="tint" min="0" max="60" value="22">
        </div>
        <div class="slider-field" style="margin:0">
          <div class="head"><label style="margin:0">Ombre</label><span class="val" id="shVal">40%</span></div>
          <input type="range" id="sh" min="0" max="80" value="40">
        </div>
      </div>

      <div class="two" style="margin-top:14px">
        <div class="color-field"><input type="color" id="txtColor" value="#ffffff"><label style="margin:0">Couleur texte</label></div>
        <div class="slider-field" style="margin:0">
          <div class="head"><label style="margin:0">Espace jour</label><span class="val" id="trkVal">6</span></div>
          <input type="range" id="trk" min="0" max="20" value="6">
        </div>
      </div>
    </div>
  </details>

  <p class="foot">1080×1440 · format Insta 3:4<br>Touche le cadre pour changer de photo · maintiens pour la recadrer · pince pour zoomer</p>
</div>

<script>
"use strict";

/* ============================================================
   ÉTAPES PRÉCHARGÉES  —  édite cette liste avec ton vrai parcours
   (ou donne-la moi et je la câble en dur)
   ============================================================ */
const STAGES = [
  { city: "Lille",       day: 1 },
  { city: "Lille",       day: 2 },
  { city: "Dunkerque",   day: 3 },
  { city: "Bruges",      day: 4 },
  { city: "Bruges",      day: 5 },
  { city: "Middelburg",  day: 6 },
  { city: "Middelburg",  day: 7 },
  { city: "Terneuzen",   day: 8 },
  { city: "Gand",        day: 9 },
];

const W = 1080, H = 1440;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// ---- state ----
let img = null;
let effScale = 1, baseScale = 1;
let drawX = 0, drawY = 0, drawW = 0, drawH = 0;

const opts = {
  city: "", day: "",
  font: "Adam Script",
  nameSz: 155, daySz: 45,
  tilt: -8, pos: 0,
  band: 13, blur: 24, tint: 22, sh: 40,
  txt: "#ffffff", trk: 6,
};

// ---- populate stage dropdown ----
const stageSel = document.getElementById('stageSel');
function buildStages(){
  stageSel.innerHTML = '<option value="">— Saisie libre —</option>' +
    STAGES.map((s,i)=>`<option value="${i}">Jour ${s.day} · ${s.city}</option>`).join('');
}
buildStages();

// ---- element refs ----
const $ = id => document.getElementById(id);
const cityIn=$('cityIn'), dayIn=$('dayIn');
const dropHint=$('dropHint'), moveHint=$('moveHint');

// ---- font loading ----
const fontCache = new Set();
async function ensureFonts(){
  const jobs = [
    document.fonts.load(`${opts.nameSz}px "${opts.font}"`),
    document.fonts.load(`700 ${opts.daySz}px "Quicksand"`),
  ];
  await Promise.all(jobs).catch(()=>{});
  await document.fonts.ready;
}

// ---- image fit (cover) ----
function fitCover(){
  baseScale = Math.max(W/img.naturalWidth, H/img.naturalHeight);
  effScale = baseScale;               // zoom 100%
  drawW = img.naturalWidth*effScale;
  drawH = img.naturalHeight*effScale;
  drawX = (W-drawW)/2;
  drawY = (H-drawH)/2;
  $('zoom').value = 100;
  $('zoomVal').textContent = '100%';
  clampDraw();
}
function clampDraw(){
  drawW = img ? img.naturalWidth*effScale : 0;
  drawH = img ? img.naturalHeight*effScale : 0;
  if(drawX > 0) drawX = 0;
  if(drawY > 0) drawY = 0;
  if(drawX < W-drawW) drawX = W-drawW;
  if(drawY < H-drawH) drawY = H-drawH;
}

// ---- render ----
let rafPending=false;
function scheduleRender(){ if(rafPending) return; rafPending=true; requestAnimationFrame(()=>{rafPending=false; render();}); }

let fontsReady=false;
function paint(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#111'; ctx.fillRect(0,0,W,H);

  if(img){
    ctx.drawImage(img, drawX, drawY, drawW, drawH);
    drawFrosted();
  }
  drawText();
}
async function render(){
  await ensureFonts();
  fontsReady=true;
  paint();
}

// Fast separable box blur on RGBA pixels (3 passes ≈ gaussian). Device-independent.
function boxBlurRGBA(pix, w, h, r){
  if(r<1) return;
  for(let p=0;p<3;p++){ boxBlurH(pix,w,h,r); boxBlurV(pix,w,h,r); }
}
function boxBlurH(src,w,h,r){
  const out=new Uint8ClampedArray(src.length), div=r+r+1;
  for(let y=0;y<h;y++){
    const row=y*w*4; let tr=0,tg=0,tb=0,ta=0;
    for(let i=-r;i<=r;i++){ const x=i<0?0:(i>=w?w-1:i), idx=row+x*4; tr+=src[idx];tg+=src[idx+1];tb+=src[idx+2];ta+=src[idx+3]; }
    for(let x=0;x<w;x++){
      const o=row+x*4; out[o]=tr/div;out[o+1]=tg/div;out[o+2]=tb/div;out[o+3]=ta/div;
      let xa=x+r+1; if(xa>=w)xa=w-1; let xr=x-r; if(xr<0)xr=0;
      const a=row+xa*4,b=row+xr*4;
      tr+=src[a]-src[b];tg+=src[a+1]-src[b+1];tb+=src[a+2]-src[b+2];ta+=src[a+3]-src[b+3];
    }
  }
  src.set(out);
}
function boxBlurV(src,w,h,r){
  const out=new Uint8ClampedArray(src.length), div=r+r+1, stride=w*4;
  for(let x=0;x<w;x++){
    const col=x*4; let tr=0,tg=0,tb=0,ta=0;
    for(let i=-r;i<=r;i++){ const y=i<0?0:(i>=h?h-1:i), idx=col+y*stride; tr+=src[idx];tg+=src[idx+1];tb+=src[idx+2];ta+=src[idx+3]; }
    for(let y=0;y<h;y++){
      const o=col+y*stride; out[o]=tr/div;out[o+1]=tg/div;out[o+2]=tb/div;out[o+3]=ta/div;
      let ya=y+r+1; if(ya>=h)ya=h-1; let yr=y-r; if(yr<0)yr=0;
      const a=col+ya*stride,b=col+yr*stride;
      tr+=src[a]-src[b];tg+=src[a+1]-src[b+1];tb+=src[a+2]-src[b+2];ta+=src[a+3]-src[b+3];
    }
  }
  src.set(out);
}

function drawFrosted(){
  if(opts.band<=0) return;
  const bandFrac = opts.band/100;
  const bandTop = H*(1-bandFrac);
  const feather = 2;   // near-hard edge, no ugly fade

  const off = document.createElement('canvas'); off.width=W; off.height=H;
  const o = off.getContext('2d');
  o.drawImage(img, drawX, drawY, drawW, drawH);
  // iOS-safe blur: real gaussian-ish blur computed in JS on the band strip.
  // (ctx.filter='blur()' is ignored on Safari iOS; downscale/upscale pixelates there.)
  if(opts.blur > 0){
    const r = Math.max(1, Math.round(opts.blur));
    const y0 = Math.max(0, Math.floor(bandTop - r - 14));
    const sh = H - y0;
    const id = o.getImageData(0, y0, W, sh);
    boxBlurRGBA(id.data, W, sh, r);
    o.putImageData(id, 0, y0);
  }
  // white veil
  o.fillStyle = `rgba(255,255,255,${opts.tint/100})`;
  o.fillRect(0,0,W,H);
  // hard-edge feathered mask (single gradient)
  o.globalCompositeOperation='destination-in';
  const g=o.createLinearGradient(0,bandTop-feather,0,bandTop+feather);
  g.addColorStop(0,'rgba(0,0,0,0)');
  g.addColorStop(1,'rgba(0,0,0,1)');
  o.fillStyle=g;
  o.fillRect(0, bandTop-feather, W, H-(bandTop-feather));
  o.globalCompositeOperation='source-over';

  ctx.drawImage(off,0,0);
}

function drawText(){
  const cx = W/2;
  const nameBaseY = 1278 + opts.pos;
  const dayBaseY  = 1390 + opts.pos;

  // --- city name ---
  if(opts.city){
    ctx.save();
    ctx.translate(cx, nameBaseY);
    ctx.rotate(opts.tilt*Math.PI/180);
    ctx.textAlign='center'; ctx.textBaseline='alphabetic';
    ctx.font = `${opts.nameSz}px "${opts.font}"`;
    ctx.shadowColor = `rgba(0,0,0,${opts.sh/100})`;
    ctx.shadowBlur = 2; ctx.shadowOffsetX = -9; ctx.shadowOffsetY = 3;
    ctx.fillStyle = opts.txt;
    ctx.fillText(opts.city, 0, 0);
    ctx.restore();
  }

  // --- day number ---
  if(opts.day!==""){
    ctx.save();
    ctx.textAlign='center'; ctx.textBaseline='alphabetic';
    ctx.font = `700 ${opts.daySz}px "Quicksand"`;
    try{ ctx.letterSpacing = opts.trk+'px'; }catch(e){}
    ctx.shadowColor = `rgba(0,0,0,${opts.sh/100*0.4})`;
    ctx.shadowBlur = 2; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 2;
    ctx.fillStyle = opts.txt;
    ctx.fillText(('JOUR '+opts.day).toUpperCase(), cx, dayBaseY);
    ctx.restore();
    try{ ctx.letterSpacing='0px'; }catch(e){}
  }
}

/* ============================= interactions ============================= */

// ---- image loading (tap, drag-drop, paste all funnel here) ----
function toast(msg){
  moveHint.textContent = msg;
  moveHint.classList.add('show');
  clearTimeout(hintTimer);
  hintTimer = setTimeout(()=>{ moveHint.classList.remove('show'); moveHint.textContent='maintiens pour déplacer · pince pour zoomer'; }, 3200);
}
function loadImageFile(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    const im = new Image();
    im.onload = ()=>{
      img = im; fitCover();
      dropHint.style.display='none';
      $('dlBtn').disabled=false;
      flashMoveHint();
      scheduleRender();
    };
    im.onerror = ()=> toast("Image illisible — essaie un JPG ou PNG");
    im.src = reader.result;
  };
  reader.onerror = ()=> toast("Erreur de lecture du fichier");
  reader.readAsDataURL(file);
}
function pickImage(){ const f=$('fileIn'); f.value=''; f.click(); }
$('fileIn').onchange = e=> loadImageFile(e.target.files[0]);

// prevent the browser from opening a dropped file anywhere on the page
document.addEventListener('dragover', e=> e.preventDefault());
document.addEventListener('drop',     e=> e.preventDefault());

// drag & drop onto the frame (reliable on desktop / GitHub Pages)
const stageWrap = $('stageWrap');
['dragenter','dragover'].forEach(ev=> stageWrap.addEventListener(ev, e=>{ e.preventDefault(); e.stopPropagation(); stageWrap.style.outline='3px dashed #c8992e'; stageWrap.style.outlineOffset='-3px'; }));
['dragleave','drop'].forEach(ev=> stageWrap.addEventListener(ev, e=>{ e.preventDefault(); e.stopPropagation(); stageWrap.style.outline='none'; }));
stageWrap.addEventListener('drop', e=>{
  let f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
  if(!f && e.dataTransfer && e.dataTransfer.items){
    for(const it of e.dataTransfer.items){ if(it.kind==='file'){ f=it.getAsFile(); break; } }
  }
  if(f) loadImageFile(f); else toast("Fichier non reçu — essaie le tap ou Cmd+V");
});
// paste an image (Cmd/Ctrl+V)
window.addEventListener('paste', e=>{
  const items = e.clipboardData && e.clipboardData.items;
  if(!items) return;
  for(const it of items){ if(it.type && it.type.startsWith('image/')){ loadImageFile(it.getAsFile()); break; } }
});

let hintTimer;
function flashMoveHint(){
  moveHint.classList.add('show');
  clearTimeout(hintTimer);
  hintTimer=setTimeout(()=>moveHint.classList.remove('show'), 2600);
}

// pointer: tap = new photo, hold/drag = reposition, 2 fingers = zoom
const pointers = new Map();
let lastMid=null, lastDist=0;
let gStart=null, gMoved=false, gAdjust=false, lpTimer=null;
const TAP_MOVE=10, LP_MS=350;

function toCanvas(e){
  const r = canvas.getBoundingClientRect();
  const sx = W/r.width, sy = H/r.height;
  return { x:(e.clientX-r.left)*sx, y:(e.clientY-r.top)*sy };
}
canvas.addEventListener('pointerdown', e=>{
  canvas.setPointerCapture(e.pointerId);
  const p = toCanvas(e);
  pointers.set(e.pointerId, p);
  if(pointers.size===1){
    gStart={x:p.x,y:p.y}; gMoved=false; gAdjust=false;
    clearTimeout(lpTimer);
    if(img){
      lpTimer=setTimeout(()=>{
        gAdjust=true; flashMoveHint();
        if(navigator.vibrate) navigator.vibrate(12);
      }, LP_MS);
    }
  } else if(pointers.size===2){
    clearTimeout(lpTimer); gAdjust=true;
    const pts=[...pointers.values()];
    lastMid={x:(pts[0].x+pts[1].x)/2, y:(pts[0].y+pts[1].y)/2};
    lastDist=Math.hypot(pts[0].x-pts[1].x, pts[0].y-pts[1].y);
  }
});
canvas.addEventListener('pointermove', e=>{
  if(!pointers.has(e.pointerId)) return;
  const prev = pointers.get(e.pointerId);
  const cur = toCanvas(e);
  pointers.set(e.pointerId, cur);

  if(pointers.size===1){
    if(gStart && Math.hypot(cur.x-gStart.x, cur.y-gStart.y) > TAP_MOVE) gMoved=true;
    if(img && (gMoved || gAdjust)){
      drawX += (cur.x - prev.x);
      drawY += (cur.y - prev.y);
      clampDraw();
      scheduleRender();
    }
  } else if(pointers.size===2){
    const pts=[...pointers.values()];
    const mid={x:(pts[0].x+pts[1].x)/2, y:(pts[0].y+pts[1].y)/2};
    const dist=Math.hypot(pts[0].x-pts[1].x, pts[0].y-pts[1].y);
    if(lastDist>0 && img){
      let f = dist/lastDist;
      let newEff = effScale*f;
      newEff = Math.max(baseScale, Math.min(baseScale*4, newEff));
      f = newEff/effScale;
      drawX = mid.x - (mid.x-drawX)*f;
      drawY = mid.y - (mid.y-drawY)*f;
      effScale = newEff;
      if(lastMid){ drawX += mid.x-lastMid.x; drawY += mid.y-lastMid.y; }
      clampDraw();
      const z=Math.round(effScale/baseScale*100);
      $('zoom').value=z; $('zoomVal').textContent=z+'%';
      scheduleRender();
    }
    lastMid=mid; lastDist=dist;
  }
});
function endPtr(e){
  const wasSingle = pointers.size===1;
  pointers.delete(e.pointerId);
  clearTimeout(lpTimer);
  if(pointers.size<2){ lastMid=null; lastDist=0; }
  if(wasSingle){
    if(!gMoved && !gAdjust) pickImage();   // clean tap → import a new photo
    gStart=null; gMoved=false; gAdjust=false;
  }
}
canvas.addEventListener('pointerup', endPtr);
canvas.addEventListener('pointercancel', endPtr);

// zoom slider (about canvas center)
$('zoom').addEventListener('input', e=>{
  if(!img) return;
  const z = +e.target.value;
  $('zoomVal').textContent = z+'%';
  const newEff = baseScale*(z/100);
  const cxp=W/2, cyp=H/2;
  const f = newEff/effScale;
  drawX = cxp - (cxp-drawX)*f;
  drawY = cyp - (cyp-drawY)*f;
  effScale = newEff;
  clampDraw();
  scheduleRender();
});

// stage select
stageSel.addEventListener('change', e=>{
  const v=e.target.value;
  if(v!==""){
    const s=STAGES[+v];
    cityIn.value=s.city; dayIn.value=s.day;
    opts.city=s.city; opts.day=String(s.day);
    scheduleRender();
  }
});
cityIn.addEventListener('input', e=>{ opts.city=e.target.value; stageSel.value=""; scheduleRender(); });
dayIn.addEventListener('input',  e=>{ opts.day=e.target.value;  stageSel.value=""; scheduleRender(); });

// generic slider bindings
function bindSlider(id, key, fmt){
  const el=$(id), out=$(id+'Val');
  el.addEventListener('input', e=>{
    opts[key]=+e.target.value;
    if(out) out.textContent=fmt?fmt(+e.target.value):e.target.value;
    scheduleRender();
  });
}
bindSlider('nameSz','nameSz');
bindSlider('daySz','daySz');
bindSlider('tilt','tilt', v=>v+'°');
bindSlider('pos','pos');
bindSlider('band','band', v=>v+'%');
bindSlider('blur','blur');
bindSlider('tint','tint', v=>v+'%');
bindSlider('sh','sh', v=>v+'%');
bindSlider('trk','trk');

$('fontSel').addEventListener('change', e=>{ opts.font=e.target.value; scheduleRender(); });
$('txtColor').addEventListener('input', e=>{ opts.txt=e.target.value; scheduleRender(); });

// export: iOS/mobile share sheet (Enregistrer l'image → galerie, ou Instagram),
// with a plain download fallback on desktop
function fileName(){
  const safe=(opts.city||'post').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/gi,'-').replace(/^-|-$/g,'').toLowerCase();
  return `${safe||'post'}-jour${opts.day||'x'}.png`;
}
function dataURLtoFile(dataURL, name){
  const [head,b64]=dataURL.split(',');
  const mime=(head.match(/:(.*?);/)||[])[1]||'image/png';
  const bin=atob(b64); const arr=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
  return new File([arr], name, {type:mime});
}
$('dlBtn').addEventListener('click', async ()=>{
  if(!img) return;
  if(fontsReady) paint(); else await render();   // keep canvas current; stay in gesture when possible
  const name = fileName();
  const dataURL = canvas.toDataURL('image/png');
  const file = dataURLtoFile(dataURL, name);
  if(navigator.canShare && navigator.canShare({files:[file]})){
    try{ await navigator.share({ files:[file], title: opts.city||'Instakrapo' }); return; }
    catch(err){ if(err && err.name==='AbortError') return; }
  }
  const a=document.createElement('a');
  a.download=name; a.href=dataURL; a.click();
});

// initial paint
render();
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=> navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}
</script>
